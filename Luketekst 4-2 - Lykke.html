<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Was ist Glück? – Lückentext</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap');

  :root {
    --bg: #F0F7FD;
    --border: #C0DD97;
    --pink: #D4537E;
    --pink-light: #FBEAF0;
    --pink-dark: #72243E;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-mid: #9FE1CB;
    --teal-dark: #085041;
    --purple: #7F77DD;
    --purple-light: #EEEDFE;
    --purple-dark: #3C3489;
    --slot-bg: #FBEAF0;
    --slot-border: #D4537E;
    --slot-text: #72243E;
    --correct-bg: #EAF3DE;
    --correct-border: #3B6D11;
    --correct-text: #27500A;
    --wrong-bg: #FCEBEB;
    --wrong-border: #A32D2D;
    --wrong-text: #A32D2D;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  .card {
    background: #fff;
    border-radius: var(--radius-xl);
    border: 0.5px solid var(--border);
    padding: 2.5rem;
    max-width: 640px;
    width: 100%;
  }

  .header {
    margin-bottom: 1.75rem;
    padding-bottom: 1.25rem;
    border-bottom: 0.5px solid var(--border);
  }

  .instr-title { font-size: 16px; font-weight: 500; color: #26215C; margin-bottom: 0.25rem; }
  .instr-sub { font-size: 13px; color: var(--pink); margin-bottom: 0.2rem; }
  .instr-note { font-size: 13px; color: var(--pink); font-style: italic; }

  .word-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.5rem;
    padding: 1rem 1.1rem;
    background: var(--teal-light);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--teal-mid);
  }

  .word-chip {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: grab;
    user-select: none;
    background: #fff;
    transition: opacity 0.15s, transform 0.1s, background 0.15s;
  }

  .word-chip:nth-child(6n+1) { border: 1.5px solid var(--pink); color: var(--pink-dark); }
  .word-chip:nth-child(6n+2) { border: 1.5px solid var(--teal); color: var(--teal-dark); }
  .word-chip:nth-child(6n+3) { border: 1.5px solid var(--purple); color: var(--purple-dark); }
  .word-chip:nth-child(6n+4) { border: 1.5px solid #EF9F27; color: #633806; }
  .word-chip:nth-child(6n+5) { border: 1.5px solid #5DCAA5; color: #0F6E56; }
  .word-chip:nth-child(6n+6) { border: 1.5px solid #ED93B1; color: #72243E; }

  .word-chip:hover { background: var(--teal-light); }
  .word-chip:active { transform: scale(0.96); }
  .word-chip.used { opacity: 0.3; cursor: default; pointer-events: none; }
  .word-chip.dragging { opacity: 0.5; }

  .text-box {
    background: #FAFFFE;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.4rem 1.6rem;
    font-size: 15px;
    line-height: 2.2;
    color: #26215C;
    margin-bottom: 1.25rem;
  }

  .text-title {
    font-family: 'Source Serif 4', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--pink-dark);
    margin-bottom: 0.75rem;
    display: block;
  }

  .drop-slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 96px;
    height: 30px;
    border-radius: 6px;
    border: 1.5px dashed var(--slot-border);
    background: var(--slot-bg);
    color: var(--slot-text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    vertical-align: middle;
    margin: 0 3px;
    padding: 0 10px;
  }

  .drop-slot.over { background: #F4C0D1; border-color: var(--pink-dark); }
  .drop-slot.filled { border-style: solid; border-color: var(--pink); background: var(--pink-light); color: var(--pink-dark); cursor: pointer; }
  .drop-slot.correct { border-color: var(--correct-border); background: var(--correct-bg); color: var(--correct-text); pointer-events: none; }
  .drop-slot.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); color: var(--wrong-text); }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: var(--radius-md);
    border: 1.5px solid var(--teal);
    background: #fff;
    color: var(--teal-dark);
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--teal-light); }
  .btn:active { transform: scale(0.98); }

  .result-msg { font-size: 14px; font-weight: 500; margin-top: 1rem; color: #26215C; min-height: 20px; }

  .solution-note {
    font-size: 12px;
    color: var(--teal);
    margin-top: 1.25rem;
    border-top: 0.5px solid var(--border);
    padding-top: 0.75rem;
  }

  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="card">
  <div class="header">
    <p class="instr-title">Fyll inn de manglende ordene.</p>
    <p class="instr-sub">Dra det riktige ordet til riktig plass i teksten. Klikk på et ord i teksten for å fjerne det igjen.</p>
    <p class="instr-note">OBS: To ord blir til overs.</p>
  </div>

  <div class="word-bank" id="wordBank"></div>
  <div class="text-box" id="textBox"></div>

  <div class="btn-row">
    <button class="btn" onclick="checkAnswers()">Sjekk svar ↗</button>
    <button class="btn" onclick="resetAll()">Start på nytt</button>
    <button class="btn" onclick="showSolution()">Vis løsning</button>
  </div>
  <div class="result-msg" id="resultMsg"></div>
  <div class="solution-note" id="solutionNote"></div>
</div>

<script>
const TEXT_PARTS = [
  "Glück bedeutet für jeden Menschen etwas anderes. Für manche ist es ",
  { id: "s1", answer: "Erfolg" },
  " im Beruf oder in der Schule, für andere sind es enge ",
  { id: "s2", answer: "Beziehungen" },
  " zu Familie und Freunden. Einige finden ihr Glück in der Natur oder beim Sport, während andere es in kreativen Hobbys wie Musik oder Kunst suchen. Wissenschaftler haben herausgefunden, dass Glück weniger von äußeren Umständen abhängt als von der eigenen ",
  { id: "s3", answer: "Einstellung" },
  " zum Leben. Wer dankbar ist und kleine Dinge schätzt, fühlt sich oft glücklicher als jemand, der nur große Ziele ",
  { id: "s4", answer: "verfolgt" },
  ". Glück ist also keine feste Größe – es ist etwas sehr Persönliches."
];

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const WORDS = shuffle(["Erfolg", "Beziehungen", "Einstellung", "verfolgt", "Reichtum", "liebt"]);

let slotValues = {};
let checked = false;

function buildText() {
  const box = document.getElementById("textBox");
  box.innerHTML = "";
  const title = document.createElement("span");
  title.className = "text-title";
  title.textContent = "Was ist Glück?";
  box.appendChild(title);
  TEXT_PARTS.forEach(part => {
    if (typeof part === "string") {
      box.appendChild(document.createTextNode(part));
    } else {
      const slot = document.createElement("span");
      slot.className = "drop-slot" + (slotValues[part.id] ? " filled" : "");
      slot.id = "slot-" + part.id;
      slot.dataset.answer = part.answer;
      slot.textContent = slotValues[part.id] || "___";
      slot.addEventListener("dragover", e => { e.preventDefault(); slot.classList.add("over"); });
      slot.addEventListener("dragleave", () => slot.classList.remove("over"));
      slot.addEventListener("drop", e => {
        e.preventDefault();
        slot.classList.remove("over");
        const word = e.dataTransfer.getData("text/plain");
        if (!word) return;
        const prev = slotValues[part.id];
        slotValues[part.id] = word;
        if (prev) returnWord(prev);
        markWordUsed(word);
        checked = false;
        buildText();
      });
      slot.addEventListener("click", () => {
        const w = slotValues[part.id];
        if (w) { returnWord(w); delete slotValues[part.id]; checked = false; buildText(); }
      });
      box.appendChild(slot);
    }
  });
  if (checked) applyColors();
}

function buildBank() {
  const bank = document.getElementById("wordBank");
  bank.innerHTML = "";
  WORDS.forEach(w => {
    const chip = document.createElement("span");
    chip.className = "word-chip" + (Object.values(slotValues).includes(w) ? " used" : "");
    chip.id = "chip-" + w;
    chip.textContent = w;
    chip.draggable = true;
    chip.addEventListener("dragstart", e => { e.dataTransfer.setData("text/plain", w); chip.classList.add("dragging"); });
    chip.addEventListener("dragend", () => chip.classList.remove("dragging"));
    bank.appendChild(chip);
  });
}

function markWordUsed(w) { const c = document.getElementById("chip-" + w); if (c) c.classList.add("used"); }
function returnWord(w) { const c = document.getElementById("chip-" + w); if (c) c.classList.remove("used"); }

function applyColors() {
  TEXT_PARTS.filter(p => typeof p === "object").forEach(p => {
    const slot = document.getElementById("slot-" + p.id);
    if (!slot) return;
    slot.classList.remove("correct", "wrong", "filled");
    if (slotValues[p.id] === p.answer) slot.classList.add("correct");
    else if (slotValues[p.id]) slot.classList.add("wrong");
  });
}

function checkAnswers() {
  const slots = TEXT_PARTS.filter(p => typeof p === "object");
  const filled = slots.filter(p => slotValues[p.id]);
  if (filled.length < slots.length) {
    document.getElementById("resultMsg").textContent = "Fyll inn alle lukene før du sjekker.";
    return;
  }
  checked = true;
  applyColors();
  const correct = slots.filter(p => slotValues[p.id] === p.answer).length;
  if (correct === slots.length) {
    document.getElementById("resultMsg").textContent = "Sehr gut! Alle svar er riktige.";
    launchButterflies();
  } else {
    document.getElementById("resultMsg").textContent = correct + " av " + slots.length + " riktige. Prøv igjen!";
  }
}

function resetAll() {
  slotValues = {};
  checked = false;
  document.getElementById("resultMsg").textContent = "";
  document.getElementById("solutionNote").textContent = "";
  buildBank();
  buildText();
}

function showSolution() {
  TEXT_PARTS.filter(p => typeof p === "object").forEach(p => { slotValues[p.id] = p.answer; });
  WORDS.forEach(markWordUsed);
  checked = true;
  buildText();
  document.getElementById("resultMsg").textContent = "";
  document.getElementById("solutionNote").textContent = "Løsning: Erfolg · Beziehungen · Einstellung · verfolgt — Distraktører: Reichtum · liebt";
}

function launchButterflies() {
  const canvas = document.getElementById("confetti-canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const wingColors = [
    ["#D4537E","#F4C0D1"],
    ["#7F77DD","#EEEDFE"],
    ["#1D9E75","#9FE1CB"],
    ["#EF9F27","#FAC775"],
    ["#ED93B1","#FBEAF0"],
    ["#5DCAA5","#E1F5EE"],
    ["#378ADD","#B5D4F4"],
  ];

  const particles = [];
  for (let i = 0; i < 55; i++) {
    const wc = wingColors[Math.floor(Math.random() * wingColors.length)];
    particles.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 200,
      wingColor: wc[0],
      wingLight: wc[1],
      speed: 1.5 + Math.random() * 2.5,
      drift: (Math.random() - 0.5) * 1.2,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.1,
      flapFrame: Math.random() * Math.PI * 2,
      flapSpeed: 0.18 + Math.random() * 0.15,
      scale: 0.7 + Math.random() * 0.6
    });
  }

  function drawButterfly(ctx, p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.scale(p.scale, p.scale);

    const flap = Math.cos(p.flapFrame) * 0.7;

    [-1, 1].forEach(side => {
      ctx.save();
      ctx.scale(side * flap, 1);

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(side * 2, -10, side * 14, -12, side * 13, -2);
      ctx.bezierCurveTo(side * 14, 4, side * 4, 6, 0, 0);
      ctx.fillStyle = p.wingColor;
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(side * 2, 4, side * 10, 10, side * 9, 4);
      ctx.bezierCurveTo(side * 10, -1, side * 3, 2, 0, 0);
      ctx.fillStyle = p.wingLight;
      ctx.fill();

      ctx.restore();
    });

    ctx.beginPath();
    ctx.ellipse(0, -1, 1.5, 7, 0, 0, Math.PI * 2);
    ctx.fillStyle = "#2C2C2A";
    ctx.fill();

    ctx.restore();
  }

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const fade = frame > 120 ? 1 - (frame - 120) / 60 : 1;
    particles.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.rot += p.rotSpeed;
      p.flapFrame += p.flapSpeed;
      ctx.globalAlpha = fade;
      drawButterfly(ctx, p);
    });
    frame++;
    if (frame < 180) requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  animate();
}

buildBank();
buildText();
</script>
</body>
</html>
