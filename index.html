<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesetrening for tysk – Nivå 2</title>
  <style>
    /* ============================================================
       KONFIGURASJON – rediger her for å legge til/endre kategorier
       ============================================================
       Hvert objekt i listen har:
         icon   – et emoji-tegn som vises på kortet
         title  – navn på oppgavetypen
         desc   – kort beskrivelse (vises under tittelen)
         accent – fargekode på toppstripe: "red" | "gold" | "dark"
         href   – lenke til oppgavesiden (f.eks. "les-og-forsta.html")

       Slik legger du til en ny kategori:
         1. Kopier én av linjene nedenfor
         2. Lim den inn etter den siste kategorien (før ];)
         3. Endre verdiene
    ============================================================ */

    /* (konfigurasjonen er i <script>-blokken nederst) */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .page { max-width: 680px; margin: 0 auto; padding: 0 1.25rem 3rem; }

    /* ---- hero ---- */
    .hero { text-align: center; padding: 2.5rem 1rem 1.5rem; }

    .flag { display: flex; justify-content: center; margin-bottom: 1.5rem; }
    .flag span { width: 44px; height: 14px; display: inline-block; }
    .flag .f1 { background: #1a1a1a; border-radius: 4px 0 0 4px; }
    .flag .f2 { background: #DD0000; }
    .flag .f3 { background: #FFCE00; border-radius: 0 4px 4px 0; }

    .reader { position: relative; width: 72px; height: 88px; margin: 0 auto 1rem; }
    .eyes { position: absolute; top: 0; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
    .eye { width: 8px; height: 8px; background: #333; border-radius: 50%;
           animation: blink 2.5s ease-in-out infinite; }
    .eye:last-child { animation-delay: .15s; }
    .book-wrap { position: absolute; bottom: 0; width: 72px; height: 70px;
                 animation: float 3s ease-in-out infinite; }
    .book-body { width: 72px; height: 60px; background: #DD0000;
                 border-radius: 3px 8px 8px 3px; position: absolute; bottom: 0;
                 box-shadow: inset -4px 0 0 #b00000; }
    .book-spine { width: 10px; height: 60px; background: #b00000;
                  border-radius: 3px 0 0 3px; position: absolute; bottom: 0; left: 0; }
    .book-page { width: 28px; height: 44px; background: #fffdf0;
                 border-radius: 0 3px 3px 0; position: absolute; right: 8px; bottom: 8px; }
    .book-line { height: 2px; background: #ccc; border-radius: 1px; margin: 5px 4px; }
    .book-page-anim { width: 28px; height: 44px; background: #f5f0e0;
                      border-radius: 0 3px 3px 0; position: absolute; right: 8px; bottom: 8px;
                      transform-origin: left center;
                      animation: pageFlip 2.4s ease-in-out infinite; }

    @keyframes float    { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-6px)} }
    @keyframes pageFlip { 0%,100%{transform:rotateY(0deg)}   50%{transform:rotateY(-20deg)} }
    @keyframes blink    { 0%,100%{opacity:1}                 50%{opacity:0.3} }

    .level-pill {
      display: inline-block; background: #FFCE00; color: #412402;
      font-size: 11px; font-weight: 600; border-radius: 20px;
      padding: 3px 14px; margin-bottom: 10px; letter-spacing: .04em;
    }
    h1 { font-size: 24px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #555; margin-bottom: 2rem; }

    /* ---- søk ---- */
    .search-row { display: flex; justify-content: center; margin-bottom: 2rem; }
    .search-wrap {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid #ddd; border-radius: 12px;
      padding: 8px 14px; width: 100%; max-width: 380px;
    }
    .search-wrap input {
      border: none; outline: none; font-size: 14px; color: #1a1a1a;
      background: transparent; flex: 1;
    }

    /* ---- seksjonslabel ---- */
    .section-label {
      font-size: 11px; font-weight: 600; color: #888;
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px;
    }

    /* ---- kortgrid ---- */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }

    .cat-card {
      background: #fff; border: 1px solid #e5e5e5; border-radius: 12px;
      padding: 1rem; text-decoration: none; color: inherit; display: block;
      transition: border-color .15s, background .15s;
    }
    .cat-card:hover { border-color: #bbb; background: #fafaf8; }

    .accent-bar { height: 3px; border-radius: 2px; margin-bottom: 10px; }
    .accent-red  { background: #DD0000; }
    .accent-gold { background: #FFCE00; }
    .accent-dark { background: #1a1a1a; }

    .cat-icon  { font-size: 22px; margin-bottom: 6px; display: block; }
    .cat-title { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 3px; }
    .cat-desc  { font-size: 12px; color: #666; line-height: 1.5; }

    /* ---- footer ---- */
    footer {
      text-align: center; margin-top: 2.5rem; color: #999; font-size: 12px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .flag-mini span { width: 10px; height: 6px; display: inline-block; }
    .flag-mini .f1 { background: #1a1a1a; border-radius: 2px 0 0 2px; }
    .flag-mini .f2 { background: #DD0000; }
    .flag-mini .f3 { background: #FFCE00; border-radius: 0 2px 2px 0; }
  </style>
</head>
<body>
<div class="page">

  <div class="hero">
    <div class="flag">
      <span class="f1"></span><span class="f2"></span><span class="f3"></span>
    </div>
    <div class="reader">
      <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
      <div class="book-wrap">
        <div class="book-spine"></div>
        <div class="book-body"></div>
        <div class="book-page">
          <div class="book-line"></div>
          <div class="book-line" style="width:70%"></div>
          <div class="book-line"></div>
          <div class="book-line" style="width:80%"></div>
          <div class="book-line" style="width:55%"></div>
        </div>
        <div class="book-page-anim"></div>
      </div>
    </div>
    <div class="level-pill">Nivå 2</div>
    <h1>Lesetrening for tysk</h1>
    <p class="subtitle">Velg en oppgavetype for å starte</p>
  </div>

  <div class="search-row">
    <div class="search-wrap">
      <span style="font-size:14px;color:#999">🔍</span>
      <input id="searchInput" placeholder="Søk etter oppgave..." />
    </div>
  </div>

  <p class="section-label">Oppgavetyper</p>
  <div class="grid" id="catGrid"></div>

  <footer>
    <div class="flag-mini">
      <span class="f1"></span><span class="f2"></span><span class="f3"></span>
    </div>
    Viel Erfolg beim Lesen!
  </footer>
</div>

<script>
  /* ============================================================
     LEGG TIL ELLER ENDRE KATEGORIER HER
     ============================================================
     Kopier én linje og lim inn etter den siste kategorien.
     Felter:
       icon   – emoji
       title  – navn på oppgavetypen
       desc   – kort beskrivelse
       accent – "red" | "gold" | "dark"
       href   – filnavn til oppgavesiden
  ============================================================ */
  const categories = [
    { icon: "📖", title: "Les og forstå",     desc: "Les en tekst og svar på spørsmål om innholdet",  accent: "red",  href: "les-og-forsta.html"      },
    { icon: "🔤", title: "Velg rett ord",      desc: "Fyll inn det riktige ordet fra en liste",         accent: "gold", href: "velg-rett-ord.html"       },
    { icon: "🧩", title: "Organiser teksten",  desc: "Sett setninger eller avsnitt i riktig rekkefølge", accent: "dark", href: "organiser-teksten.html"  },
  ];
  /* ============================================================ */

  function render(list) {
    const grid = document.getElementById('catGrid');
    grid.innerHTML = list.map(c => `
      <a class="cat-card" href="${c.href}">
        <div class="accent-bar accent-${c.accent}"></div>
        <span class="cat-icon">${c.icon}</span>
        <p class="cat-title">${c.title}</p>
        <p class="cat-desc">${c.desc}</p>
      </a>
    `).join('');
  }

  render(categories);

  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    render(q ? categories.filter(c =>
      c.title.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q)
    ) : categories);
  });
</script>
</body>
</html>
