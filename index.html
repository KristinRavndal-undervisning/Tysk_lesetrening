<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesetrening for tysk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .page { max-width: 620px; margin: 0 auto; padding: 0 1.25rem 3rem; }

    /* ---- hero ---- */
    .hero { text-align: center; padding: 2.5rem 1rem 1.75rem; }

    .flag { display: flex; justify-content: center; margin-bottom: 1.5rem; }
    .flag span { width: 44px; height: 14px; display: inline-block; }
    .flag .f1 { background: #1a1a1a; border-radius: 4px 0 0 4px; }
    .flag .f2 { background: #DD0000; }
    .flag .f3 { background: #FFCE00; border-radius: 0 4px 4px 0; }

    /* ---- animated book scene ---- */
    .scene {
      width: 200px; height: 160px;
      margin: 0 auto 1.2rem;
      position: relative;
      display: flex; align-items: flex-end; justify-content: center;
    }

    .table-top   { position:absolute; bottom:28px; left:0; right:0; height:10px; background:#c8a96e; border-radius:3px; }
    .table-edge  { position:absolute; bottom:18px; left:0; right:0; height:10px; background:#a8894e; border-radius:0 0 3px 3px; }
    .table-shadow{ position:absolute; bottom:15px; left:20px; right:20px; height:6px; background:rgba(0,0,0,0.10); border-radius:50%; }

    .book-wrap {
      position: absolute;
      bottom: 37px;
      left: 50%; transform: translateX(-50%);
    }
    .book-shadow {
      position: absolute;
      bottom: -4px; left: 50%; transform: translateX(-50%);
      width: 110px; height: 8px;
      background: rgba(0,0,0,0.13);
      border-radius: 50%;
    }

    .open-book {
      display: flex; align-items: flex-end;
      transform: perspective(400px) rotateX(28deg);
      transform-origin: bottom center;
    }

    .page-left {
      width: 52px; height: 64px;
      background: #fffdf0;
      border-radius: 5px 0 0 1px;
      border: 1px solid #e0d8be;
      transform: perspective(300px) rotateY(18deg);
      transform-origin: right bottom;
      position: relative;
    }
    .page-right {
      width: 52px; height: 64px;
      background: #faf6e4;
      border-radius: 0 5px 1px 0;
      border: 1px solid #e0d8be;
      transform: perspective(300px) rotateY(-18deg);
      transform-origin: left bottom;
      position: relative;
    }
    .spine-center {
      width: 10px; height: 64px;
      background: #DD0000;
      flex-shrink: 0;
      border-radius: 1px;
    }
    .cover-left {
      position: absolute; bottom: -7px; left: -4px; right: -1px; height: 9px;
      background: #DD0000; border-radius: 3px 0 0 3px;
      transform: perspective(300px) rotateY(18deg); transform-origin: right bottom;
    }
    .cover-right {
      position: absolute; bottom: -7px; left: -1px; right: -4px; height: 9px;
      background: #c40000; border-radius: 0 3px 3px 0;
      transform: perspective(300px) rotateY(-18deg); transform-origin: left bottom;
    }

    .pl { height: 2px; background: #ddd; border-radius: 1px; margin: 8px 6px 0; }
    .pl.s { width: 55%; }
    .pl.m { width: 75%; }

    /* Stars */
    .star {
      position: absolute;
      clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
      background: #FFCE00;
      opacity: 0;
      animation: rise linear infinite;
    }
    .s1 { width:11px;height:11px; left:62px;  bottom:60px; animation-duration:2.2s; animation-delay:0s;   --dx: 5px;  }
    .s2 { width:7px; height:7px;  left:78px;  bottom:60px; animation-duration:2.7s; animation-delay:0.5s; --dx:-8px;  }
    .s3 { width:13px;height:13px; left:95px;  bottom:60px; animation-duration:2.0s; animation-delay:1.0s; --dx: 3px;  }
    .s4 { width:6px; height:6px;  left:112px; bottom:60px; animation-duration:2.9s; animation-delay:0.3s; --dx:-5px;  }
    .s5 { width:9px; height:9px;  left:70px;  bottom:60px; animation-duration:2.4s; animation-delay:1.4s; --dx: 11px; }
    .s6 { width:7px; height:7px;  left:104px; bottom:60px; animation-duration:2.1s; animation-delay:1.8s; --dx:-10px; }
    .s7 { width:10px;height:10px; left:86px;  bottom:60px; animation-duration:2.6s; animation-delay:0.8s; --dx: 7px;  }

    @keyframes rise {
      0%   { opacity:0;   transform:translateY(0)     translateX(0)              rotate(0deg)  scale(0.5); }
      15%  { opacity:1; }
      85%  { opacity:0.6; }
      100% { opacity:0;   transform:translateY(-85px) translateX(var(--dx, 6px)) rotate(35deg) scale(1.1); }
    }

    /* ---- tittel ---- */
    h1 { font-size: 24px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
    .hero-sub { font-size: 14px; color: #555; }

    /* ---- oppgaveliste ---- */
    .section-label {
      font-size: 11px; font-weight: 600; color: #888;
      letter-spacing: .08em; text-transform: uppercase;
      margin: 2rem 0 10px;
    }

    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-left: 4px solid #DD0000;
      border-radius: 0 10px 10px 0;
      padding: 1rem 1.1rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: background .15s, border-color .15s;
    }
    .task-card:hover { background: #fafaf8; border-color: #ccc; border-left-color: #DD0000; }

    .task-text { flex: 1; }
    .task-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 3px; }
    .task-desc  { font-size: 13px; color: #666; line-height: 1.4; }
    .task-arrow { color: #bbb; font-size: 20px; flex-shrink: 0; line-height: 1; }

    /* ---- footer ---- */
    footer {
      text-align: center; margin-top: 2.5rem; color: #999; font-size: 12px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .flag-mini span { width: 10px; height: 6px; display: inline-block; }
    .flag-mini .f1 { background: #1a1a1a; border-radius: 2px 0 0 2px; }
    .flag-mini .f2 { background: #DD0000; }
    .flag-mini .f3 { background: #FFCE00; border-radius: 0 2px 2px 0; }
  </style>
</head>
<body>
<div class="page">

  <div class="hero">
    <div class="flag">
      <span class="f1"></span><span class="f2"></span><span class="f3"></span>
    </div>

    <div class="scene">
      <div class="star s1"></div>
      <div class="star s2"></div>
      <div class="star s3"></div>
      <div class="star s4"></div>
      <div class="star s5"></div>
      <div class="star s6"></div>
      <div class="star s7"></div>

      <div class="book-wrap">
        <div class="book-shadow"></div>
        <div class="open-book">
          <div class="page-left">
            <div class="pl"></div>
            <div class="pl s"></div>
            <div class="pl m"></div>
            <div class="pl s"></div>
            <div class="pl"></div>
          </div>
          <div class="spine-center"></div>
          <div class="page-right">
            <div class="pl m"></div>
            <div class="pl"></div>
            <div class="pl s"></div>
            <div class="pl m"></div>
            <div class="pl s"></div>
          </div>
          <div class="cover-left"></div>
          <div class="cover-right"></div>
        </div>
      </div>

      <div class="table-top"></div>
      <div class="table-edge"></div>
      <div class="table-shadow"></div>
    </div>

    <h1>Lesetrening for tysk</h1>
    <p class="hero-sub">Velg en oppgave for å starte</p>
  </div>

  <p class="section-label">Oppgaver</p>
  <div class="task-list" id="taskList"></div>

  <footer>
    <div class="flag-mini">
      <span class="f1"></span><span class="f2"></span><span class="f3"></span>
    </div>
    Viel Erfolg beim Lesen!
  </footer>

</div>
<script>
  /* ============================================================
     LEGG TIL ELLER ENDRE OPPGAVER HER
     ============================================================
     Hvert objekt har:
       title  – navn på oppgaven
       desc   – kort beskrivelse av hva eleven skal gjøre
       href   – filnavn til oppgavesiden

     VIKTIG: Ikke endre href etter at undersiden er opprettet.
     Tittelen kan du endre fritt uten at lenken brekker.

     Slik legger du til en ny oppgave:
       1. Kopier én av linjene nedenfor
       2. Lim inn etter siste oppgave (før ];)
       3. Gi den neste ledige nummer, f.eks. "oppgave-04.html"
       4. Endre title og desc
  ============================================================ */
  const tasks = [
    { title: "Eksamensprep, 5 ulike oppgaver", desc: "Jobb med ulike oppgavetyper og se hvor mange rette svar du får.",  href: "Lesing-eksamensprep-5oppg" },
   
  ];
  /* ============================================================ */

  document.getElementById('taskList').innerHTML = tasks.map(t => `
    <a class="task-card" href="${t.href}">
      <div class="task-text">
        <p class="task-title">${t.title}</p>
        <p class="task-desc">${t.desc}</p>
      </div>
      <span class="task-arrow">›</span>
    </a>
  `).join('');
</script>
</body>
</html>
