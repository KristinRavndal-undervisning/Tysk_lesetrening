<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sommerjob – Lückentext</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap');

  :root {
    --bg: #F4F9EC;
    --border: #C0DD97;
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --green-mid: #97C459;
    --green-dark: #27500A;
    --yellow: #BA7517;
    --yellow-light: #FAEEDA;
    --yellow-mid: #FAC775;
    --yellow-dark: #412402;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-mid: #9FE1CB;
    --slot-bg: #EAF3DE;
    --slot-border: #639922;
    --slot-text: #27500A;
    --correct-bg: #EAF3DE;
    --correct-border: #3B6D11;
    --correct-text: #27500A;
    --wrong-bg: #FCEBEB;
    --wrong-border: #A32D2D;
    --wrong-text: #A32D2D;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 2rem;
  }

  .card {
    background: #fff;
    border-radius: var(--radius-xl);
    border: 0.5px solid var(--border);
    padding: 2.5rem 3rem;
    max-width: 960px;
    width: 100%;
  }

  .header {
    margin-bottom: 1.75rem;
    padding-bottom: 1.25rem;
    border-bottom: 0.5px solid var(--border);
  }

  .instr-title { font-size: 16px; font-weight: 500; color: var(--green-dark); margin-bottom: 0.25rem; }
  .instr-sub { font-size: 13px; color: var(--green); margin-bottom: 0.2rem; }
  .instr-note { font-size: 13px; color: var(--green); font-style: italic; }

  .word-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.5rem;
    padding: 1rem 1.25rem;
    background: var(--yellow-light);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--yellow-mid);
  }

  .word-chip {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: grab;
    user-select: none;
    background: #fff;
    transition: opacity 0.15s, transform 0.1s, background 0.15s;
  }

  .word-chip:nth-child(13n+1)  { border: 1.5px solid var(--green); color: var(--green-dark); }
  .word-chip:nth-child(13n+2)  { border: 1.5px solid var(--yellow); color: var(--yellow-dark); }
  .word-chip:nth-child(13n+3)  { border: 1.5px solid var(--teal); color: #085041; }
  .word-chip:nth-child(13n+4)  { border: 1.5px solid #639922; color: #173404; }
  .word-chip:nth-child(13n+5)  { border: 1.5px solid var(--yellow-mid); color: var(--yellow-dark); }
  .word-chip:nth-child(13n+6)  { border: 1.5px solid var(--teal-mid); color: #0F6E56; }
  .word-chip:nth-child(13n+7)  { border: 1.5px solid #97C459; color: #27500A; }
  .word-chip:nth-child(13n+8)  { border: 1.5px solid var(--green); color: var(--green-dark); }
  .word-chip:nth-child(13n+9)  { border: 1.5px solid var(--yellow); color: var(--yellow-dark); }
  .word-chip:nth-child(13n+10) { border: 1.5px solid var(--teal); color: #085041; }
  .word-chip:nth-child(13n+11) { border: 1.5px solid #639922; color: #173404; }
  .word-chip:nth-child(13n+12) { border: 1.5px solid var(--yellow-mid); color: var(--yellow-dark); }
  .word-chip:nth-child(13n+13) { border: 1.5px solid var(--teal-mid); color: #0F6E56; }

  .word-chip:hover { background: var(--green-light); }
  .word-chip:active { transform: scale(0.96); }
  .word-chip.used { opacity: 0.3; cursor: default; pointer-events: none; }
  .word-chip.dragging { opacity: 0.5; }

  .text-box {
    background: #FAFFF5;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem 2rem;
    font-size: 15px;
    line-height: 2.2;
    color: #173404;
    margin-bottom: 1.25rem;
    columns: 1;
  }

  .text-title {
    font-family: 'Source Serif 4', serif;
    font-size: 19px;
    font-weight: 600;
    color: var(--green-dark);
    margin-bottom: 0.85rem;
    display: block;
  }

  .para { break-inside: avoid; margin-bottom: 0.75rem; }

  .drop-slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 96px;
    height: 30px;
    border-radius: 6px;
    border: 1.5px dashed var(--slot-border);
    background: var(--slot-bg);
    color: var(--slot-text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    vertical-align: middle;
    margin: 0 3px;
    padding: 0 10px;
  }

  .drop-slot.over { background: var(--green-mid); border-color: var(--green-dark); }
  .drop-slot.filled { border-style: solid; border-color: var(--green); background: var(--green-light); color: var(--green-dark); cursor: pointer; }
  .drop-slot.correct { border-color: var(--correct-border); background: var(--correct-bg); color: var(--correct-text); pointer-events: none; }
  .drop-slot.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); color: var(--wrong-text); }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: var(--radius-md);
    border: 1.5px solid var(--green);
    background: #fff;
    color: var(--green-dark);
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--green-light); }
  .btn:active { transform: scale(0.98); }

  .result-msg { font-size: 14px; font-weight: 500; margin-top: 1rem; color: var(--green-dark); min-height: 20px; }

  .solution-note {
    font-size: 12px;
    color: var(--green);
    margin-top: 1.25rem;
    border-top: 0.5px solid var(--border);
    padding-top: 0.75rem;
  }

  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  @media (max-width: 700px) {
    .text-box { columns: 1; }
    .card { padding: 1.5rem; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="card">
  <div class="header">
    <p class="instr-title">Fyll inn de manglende ordene.</p>
    <p class="instr-sub">Dra det riktige ordet til riktig plass i teksten. Klikk på et ord i teksten for å fjerne det igjen.</p>
    <p class="instr-note">OBS: Tre ord blir til overs.</p>
  </div>

  <div class="word-bank" id="wordBank"></div>
  <div class="text-box" id="textBox"></div>

  <div class="btn-row">
    <button class="btn" onclick="checkAnswers()">Sjekk svar ↗</button>
    <button class="btn" onclick="resetAll()">Start på nytt</button>
    <button class="btn" onclick="showSolution()">Vis løsning</button>
  </div>
  <div class="result-msg" id="resultMsg"></div>
  <div class="solution-note" id="solutionNote"></div>
</div>

<script>
const PARAS = [
  [
    "Viele Jugendliche suchen sich in den Sommerferien einen Ferienjob. Das ist eine gute Möglichkeit, eigenes Geld zu ",
    { id: "s1", answer: "verdienen" },
    " und gleichzeitig erste ",
    { id: "s2", answer: "Berufserfahrung" },
    " zu sammeln. Beliebte Branchen sind der Einzelhandel, die Gastronomie und der Tourismus – dort werden in der Sommersaison besonders viele ",
    { id: "s3", answer: "Aushilfen" },
    " gebraucht."
  ],
  [
    "Ein Ferienjob bringt nicht nur finanzielle ",
    { id: "s4", answer: "Vorteile" },
    ". Man lernt auch, ",
    { id: "s5", answer: "pünktlich" },
    " zu sein, Verantwortung zu übernehmen und im Team zu arbeiten. Diese Fähigkeiten sind später im Berufsleben sehr ",
    { id: "s6", answer: "wertvoll" },
    ". Außerdem kann man durch einen Ferienjob neue Menschen kennenlernen und Kontakte knüpfen."
  ],
  [
    "Natürlich gibt es auch Herausforderungen. Die Arbeit kann körperlich ",
    { id: "s7", answer: "anstrengend" },
    " sein, besonders wenn man lange Schichten hat oder draußen arbeitet. Manche Jugendliche müssen früh aufstehen und auf Freizeitaktivitäten ",
    { id: "s8", answer: "verzichten" },
    ". Trotzdem sagen die meisten im Nachhinein, dass der Ferienjob eine wertvolle Erfahrung war."
  ],
  [
    "Wer einen Sommerjob sucht, sollte sich früh ",
    { id: "s9", answer: "bewerben" },
    " – am besten schon im Frühjahr, denn die beliebtesten Stellen sind schnell vergeben. Ein kurzes, freundliches Bewerbungsschreiben und ein gepflegtes Auftreten hinterlassen einen guten ",
    { id: "s10", answer: "ersten" },
    " Eindruck."
  ]
];

const ALL_PARTS = PARAS.flat();

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const WORDS = shuffle(["verdienen","Berufserfahrung","Aushilfen","Vorteile","pünktlich","wertvoll","anstrengend","verzichten","bewerben","ersten","jobben","Freizeit","sparen"]);

let slotValues = {};
let checked = false;

function buildText() {
  const box = document.getElementById("textBox");
  box.innerHTML = "";

  const title = document.createElement("span");
  title.className = "text-title";
  title.textContent = "Der Sommerjob";
  box.appendChild(title);

  PARAS.forEach(para => {
    const p = document.createElement("p");
    p.className = "para";
    para.forEach(part => {
      if (typeof part === "string") {
        p.appendChild(document.createTextNode(part));
      } else {
        const slot = document.createElement("span");
        slot.className = "drop-slot" + (slotValues[part.id] ? " filled" : "");
        slot.id = "slot-" + part.id;
        slot.dataset.answer = part.answer;
        slot.textContent = slotValues[part.id] || "___";
        slot.addEventListener("dragover", e => { e.preventDefault(); slot.classList.add("over"); });
        slot.addEventListener("dragleave", () => slot.classList.remove("over"));
        slot.addEventListener("drop", e => {
          e.preventDefault();
          slot.classList.remove("over");
          const word = e.dataTransfer.getData("text/plain");
          if (!word) return;
          const prev = slotValues[part.id];
          slotValues[part.id] = word;
          if (prev) returnWord(prev);
          markWordUsed(word);
          checked = false;
          buildText();
        });
        slot.addEventListener("click", () => {
          const w = slotValues[part.id];
          if (w) { returnWord(w); delete slotValues[part.id]; checked = false; buildText(); }
        });
        p.appendChild(slot);
      }
    });
    box.appendChild(p);
  });

  if (checked) applyColors();
}

function buildBank() {
  const bank = document.getElementById("wordBank");
  bank.innerHTML = "";
  WORDS.forEach(w => {
    const chip = document.createElement("span");
    chip.className = "word-chip" + (Object.values(slotValues).includes(w) ? " used" : "");
    chip.id = "chip-" + w;
    chip.textContent = w;
    chip.draggable = true;
    chip.addEventListener("dragstart", e => { e.dataTransfer.setData("text/plain", w); chip.classList.add("dragging"); });
    chip.addEventListener("dragend", () => chip.classList.remove("dragging"));
    bank.appendChild(chip);
  });
}

function markWordUsed(w) { const c = document.getElementById("chip-" + w); if (c) c.classList.add("used"); }
function returnWord(w) { const c = document.getElementById("chip-" + w); if (c) c.classList.remove("used"); }

function applyColors() {
  ALL_PARTS.filter(p => typeof p === "object").forEach(p => {
    const slot = document.getElementById("slot-" + p.id);
    if (!slot) return;
    slot.classList.remove("correct", "wrong", "filled");
    if (slotValues[p.id] === p.answer) slot.classList.add("correct");
    else if (slotValues[p.id]) slot.classList.add("wrong");
  });
}

function checkAnswers() {
  const slots = ALL_PARTS.filter(p => typeof p === "object");
  const filled = slots.filter(p => slotValues[p.id]);
  if (filled.length < slots.length) {
    document.getElementById("resultMsg").textContent = "Fyll inn alle lukene før du sjekker.";
    return;
  }
  checked = true;
  applyColors();
  const correct = slots.filter(p => slotValues[p.id] === p.answer).length;
  if (correct === slots.length) {
    document.getElementById("resultMsg").textContent = "Sehr gut! Alle svar er riktige.";
    launchMoney();
  } else {
    document.getElementById("resultMsg").textContent = correct + " av " + slots.length + " riktige. Prøv igjen!";
  }
}

function resetAll() {
  slotValues = {};
  checked = false;
  document.getElementById("resultMsg").textContent = "";
  document.getElementById("solutionNote").textContent = "";
  buildBank();
  buildText();
}

function showSolution() {
  ALL_PARTS.filter(p => typeof p === "object").forEach(p => { slotValues[p.id] = p.answer; });
  WORDS.forEach(markWordUsed);
  checked = true;
  buildText();
  document.getElementById("resultMsg").textContent = "";
  document.getElementById("solutionNote").textContent = "Løsning: verdienen · Berufserfahrung · Aushilfen · Vorteile · pünktlich · wertvoll · anstrengend · verzichten · bewerben · ersten — Distraktører: jobben · Freizeit · sparen";
}

function launchMoney() {
  const canvas = document.getElementById("confetti-canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  for (let i = 0; i < 70; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 200,
      type: Math.random() < 0.6 ? "bill" : "coin",
      speed: 1.5 + Math.random() * 2.5,
      drift: (Math.random() - 0.5) * 1.2,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.1,
      scale: 0.7 + Math.random() * 0.6,
      shade: Math.random() < 0.5 ? 0 : 1
    });
  }

  function drawBill(ctx, shade) {
    const w = 28, h = 14;
    const greens = [["#639922","#EAF3DE","#3B6D11"],["#1D9E75","#E1F5EE","#085041"]];
    const [fill, light, dark] = greens[shade];
    ctx.beginPath();
    ctx.roundRect(-w/2, -h/2, w, h, 2);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = dark;
    ctx.lineWidth = 0.6;
    ctx.stroke();
    ctx.beginPath();
    ctx.roundRect(-w/2 + 3, -h/2 + 3, w - 6, h - 6, 1);
    ctx.strokeStyle = light;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = light;
    ctx.fill();
    ctx.font = "bold 4px sans-serif";
    ctx.fillStyle = fill;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("€", 0, 0);
  }

  function drawCoin(ctx, shade) {
    const r = 8;
    const golds = ["#EF9F27","#FAC775"];
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = golds[shade];
    ctx.fill();
    ctx.strokeStyle = "#854F0B";
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2);
    ctx.strokeStyle = "#633806";
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.font = "bold 6px sans-serif";
    ctx.fillStyle = "#412402";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("€", 0, 0.5);
  }

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const fade = frame > 120 ? 1 - (frame - 120) / 60 : 1;
    particles.forEach(p => {
      p.y += p.speed; p.x += p.drift; p.rot += p.rotSpeed;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.scale(p.scale, p.scale);
      ctx.globalAlpha = fade;
      if (p.type === "bill") drawBill(ctx, p.shade);
      else drawCoin(ctx, p.shade);
      ctx.restore();
    });
    frame++;
    if (frame < 180) requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  animate();
}

buildBank();
buildText();
</script>
</body>
</html>
