<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karneval in Köln – Lückentext</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap');

  :root {
    --karn-bg: #EEF7F2;
    --karn-border: #9FE1CB;
    --karn-purple: #7F77DD;
    --karn-purple-light: #EEEDFE;
    --karn-purple-dark: #3C3489;
    --karn-teal: #1D9E75;
    --karn-teal-light: #E1F5EE;
    --karn-blue: #378ADD;
    --karn-blue-light: #E6F1FB;
    --karn-blue-dark: #0C447C;
    --slot-bg: #E6F1FB;
    --slot-border: #378ADD;
    --slot-text: #0C447C;
    --correct-bg: #EAF3DE;
    --correct-border: #3B6D11;
    --correct-text: #27500A;
    --wrong-bg: #FCEBEB;
    --wrong-border: #A32D2D;
    --wrong-text: #A32D2D;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--karn-bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  .card {
    background: #fff;
    border-radius: var(--radius-xl);
    border: 0.5px solid var(--karn-border);
    padding: 2.5rem;
    max-width: 640px;
    width: 100%;
  }

  .header {
    margin-bottom: 1.75rem;
    padding-bottom: 1.25rem;
    border-bottom: 0.5px solid var(--karn-border);
  }

  .instr-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--karn-blue-dark);
    margin-bottom: 0.25rem;
  }

  .instr-sub {
    font-size: 13px;
    color: var(--karn-teal);
    margin-bottom: 0.2rem;
  }

  .instr-note {
    font-size: 13px;
    color: var(--karn-teal);
    font-style: italic;
  }

  .word-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.5rem;
    padding: 1rem 1.1rem;
    background: var(--karn-teal-light);
    border-radius: var(--radius-lg);
    border: 0.5px solid #9FE1CB;
  }

  .word-chip {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: grab;
    user-select: none;
    background: #fff;
    transition: opacity 0.15s, transform 0.1s, background 0.15s;
  }

  .word-chip:nth-child(5n+1) { border: 1.5px solid var(--karn-blue); color: var(--karn-blue-dark); }
  .word-chip:nth-child(5n+2) { border: 1.5px solid var(--karn-teal); color: #085041; }
  .word-chip:nth-child(5n+3) { border: 1.5px solid var(--karn-purple); color: var(--karn-purple-dark); }
  .word-chip:nth-child(5n+4) { border: 1.5px solid #5DCAA5; color: #0F6E56; }
  .word-chip:nth-child(5n+5) { border: 1.5px solid #85B7EB; color: #185FA5; }

  .word-chip:hover { background: var(--karn-teal-light); }
  .word-chip:active { transform: scale(0.96); }
  .word-chip.used { opacity: 0.3; cursor: default; pointer-events: none; }
  .word-chip.dragging { opacity: 0.5; }

  .text-box {
    background: #FAFCFF;
    border: 0.5px solid var(--karn-border);
    border-radius: var(--radius-lg);
    padding: 1.4rem 1.6rem;
    font-size: 15px;
    line-height: 2.2;
    color: #042C53;
    margin-bottom: 1.25rem;
  }

  .text-title {
    font-family: 'Source Serif 4', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--karn-blue-dark);
    margin-bottom: 0.75rem;
    display: block;
  }

  .drop-slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 96px;
    height: 30px;
    border-radius: 6px;
    border: 1.5px dashed var(--slot-border);
    background: var(--slot-bg);
    color: var(--slot-text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    vertical-align: middle;
    margin: 0 3px;
    padding: 0 10px;
  }

  .drop-slot.over { background: #B5D4F4; border-color: var(--karn-blue-dark); }
  .drop-slot.filled { border-style: solid; border-color: var(--karn-blue); background: var(--karn-blue-light); color: var(--karn-blue-dark); cursor: pointer; }
  .drop-slot.correct { border-color: var(--correct-border); background: var(--correct-bg); color: var(--correct-text); pointer-events: none; }
  .drop-slot.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); color: var(--wrong-text); }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: var(--radius-md);
    border: 1.5px solid var(--karn-teal);
    background: #fff;
    color: #085041;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--karn-teal-light); }
  .btn:active { transform: scale(0.98); }

  .result-msg {
    font-size: 14px;
    font-weight: 500;
    margin-top: 1rem;
    color: var(--karn-blue-dark);
    min-height: 20px;
  }

  .solution-note {
    font-size: 12px;
    color: var(--karn-teal);
    margin-top: 1.25rem;
    border-top: 0.5px solid var(--karn-border);
    padding-top: 0.75rem;
  }

  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="card">
  <div class="header">
    <p class="instr-title">Fyll inn de manglende ordene.</p>
    <p class="instr-sub">Dra det riktige ordet til riktig plass i teksten. Klikk på et ord i teksten for å fjerne det igjen.</p>
    <p class="instr-note">OBS: Ett ord blir til overs.</p>
  </div>

  <div class="word-bank" id="wordBank"></div>
  <div class="text-box" id="textBox"></div>

  <div class="btn-row">
    <button class="btn" onclick="checkAnswers()">Sjekk svar ↗</button>
    <button class="btn" onclick="resetAll()">Start på nytt</button>
    <button class="btn" onclick="showSolution()">Vis løsning</button>
  </div>
  <div class="result-msg" id="resultMsg"></div>
  <div class="solution-note" id="solutionNote"></div>
</div>

<script>
const TEXT_PARTS = [
  "Der Kölner Karneval ist eines der größten Volksfeste in Deutschland. Hunderttausende Menschen feiern fünf Tage lang auf den ",
  { id: "s1", answer: "Straßen" },
  " der Stadt. Die Feierlichkeiten beginnen offiziell am 11. November, aber der Höhepunkt ist der ",
  { id: "s2", answer: "Rosenmontagszug" },
  " im Februar oder März. Dieser Umzug findet seit 1823 statt. Die Menschen verkleiden sich in bunte ",
  { id: "s3", answer: "Kostüme" },
  " und werfen Süßigkeiten in die ",
  { id: "s4", answer: "Menge" },
  ". Humor und Satire sind typisch für das Fest. Viele Besucher kommen von weit her, um diesen besonderen Karneval zu erleben."
];

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const WORDS = shuffle(["Straßen", "Rosenmontagszug", "Kostüme", "Menge", "Musik"]);

let slotValues = {};
let checked = false;

function buildText() {
  const box = document.getElementById("textBox");
  box.innerHTML = "";
  const title = document.createElement("span");
  title.className = "text-title";
  title.textContent = "Karneval in Köln";
  box.appendChild(title);
  TEXT_PARTS.forEach(part => {
    if (typeof part === "string") {
      box.appendChild(document.createTextNode(part));
    } else {
      const slot = document.createElement("span");
      slot.className = "drop-slot" + (slotValues[part.id] ? " filled" : "");
      slot.id = "slot-" + part.id;
      slot.dataset.answer = part.answer;
      slot.textContent = slotValues[part.id] || "___";
      slot.addEventListener("dragover", e => { e.preventDefault(); slot.classList.add("over"); });
      slot.addEventListener("dragleave", () => slot.classList.remove("over"));
      slot.addEventListener("drop", e => {
        e.preventDefault();
        slot.classList.remove("over");
        const word = e.dataTransfer.getData("text/plain");
        if (!word) return;
        const prev = slotValues[part.id];
        slotValues[part.id] = word;
        if (prev) returnWord(prev);
        markWordUsed(word);
        checked = false;
        buildText();
      });
      slot.addEventListener("click", () => {
        const w = slotValues[part.id];
        if (w) { returnWord(w); delete slotValues[part.id]; checked = false; buildText(); }
      });
      box.appendChild(slot);
    }
  });
  if (checked) applyColors();
}

function buildBank() {
  const bank = document.getElementById("wordBank");
  bank.innerHTML = "";
  WORDS.forEach(w => {
    const chip = document.createElement("span");
    chip.className = "word-chip" + (Object.values(slotValues).includes(w) ? " used" : "");
    chip.id = "chip-" + w;
    chip.textContent = w;
    chip.draggable = true;
    chip.addEventListener("dragstart", e => { e.dataTransfer.setData("text/plain", w); chip.classList.add("dragging"); });
    chip.addEventListener("dragend", () => chip.classList.remove("dragging"));
    bank.appendChild(chip);
  });
}

function markWordUsed(w) { const c = document.getElementById("chip-" + w); if (c) c.classList.add("used"); }
function returnWord(w) { const c = document.getElementById("chip-" + w); if (c) c.classList.remove("used"); }

function applyColors() {
  TEXT_PARTS.filter(p => typeof p === "object").forEach(p => {
    const slot = document.getElementById("slot-" + p.id);
    if (!slot) return;
    slot.classList.remove("correct", "wrong", "filled");
    if (slotValues[p.id] === p.answer) slot.classList.add("correct");
    else if (slotValues[p.id]) slot.classList.add("wrong");
  });
}

function checkAnswers() {
  const slots = TEXT_PARTS.filter(p => typeof p === "object");
  const filled = slots.filter(p => slotValues[p.id]);
  if (filled.length < slots.length) {
    document.getElementById("resultMsg").textContent = "Fyll inn alle lukene før du sjekker.";
    return;
  }
  checked = true;
  applyColors();
  const correct = slots.filter(p => slotValues[p.id] === p.answer).length;
  if (correct === slots.length) {
    document.getElementById("resultMsg").textContent = "Sehr gut! Alle svar er riktige.";
    launchCandies();
  } else {
    document.getElementById("resultMsg").textContent = correct + " av " + slots.length + " riktige. Prøv igjen!";
  }
}

function resetAll() {
  slotValues = {};
  checked = false;
  document.getElementById("resultMsg").textContent = "";
  document.getElementById("solutionNote").textContent = "";
  buildBank();
  buildText();
}

function showSolution() {
  TEXT_PARTS.filter(p => typeof p === "object").forEach(p => { slotValues[p.id] = p.answer; });
  WORDS.forEach(markWordUsed);
  checked = true;
  buildText();
  document.getElementById("resultMsg").textContent = "";
  document.getElementById("solutionNote").textContent = "Løsning: Straßen · Rosenmontagszug · Kostüme · Menge — Distraktør: Musik";
}

function launchCandies() {
  const canvas = document.getElementById("confetti-canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = [
    "#378ADD", "#1D9E75", "#7F77DD", "#5DCAA5", "#85B7EB",
    "#B5D4F4", "#9FE1CB", "#CECBF6", "#0C447C", "#085041"
  ];
  const wraps = ["#E6F1FB", "#E1F5EE", "#ffffff", "#B5D4F4", "#EEEDFE"];

  const particles = [];
  for (let i = 0; i < 70; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 220,
      color: colors[Math.floor(Math.random() * colors.length)],
      wrap: wraps[Math.floor(Math.random() * wraps.length)],
      speed: 1.8 + Math.random() * 2.5,
      drift: (Math.random() - 0.5) * 1.2,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.1,
      opacity: 1
    });
  }

  function drawCandy(ctx, p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = p.opacity;

    const bw = 18, bh = 16, neckW = 5, neckH = 7, endW = 10, endH = 14;

    ctx.beginPath();
    ctx.ellipse(0, 0, bw, bh / 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();

    ctx.strokeStyle = p.wrap;
    ctx.lineWidth = 1.3;
    for (let lx = -bw + 3; lx < bw; lx += 6) {
      ctx.beginPath();
      ctx.moveTo(lx, -bh / 2 + 1);
      ctx.lineTo(lx, bh / 2 - 1);
      ctx.stroke();
    }

    [-1, 1].forEach(side => {
      const nx = side * (bw + neckW / 2 + 1);
      ctx.beginPath();
      ctx.ellipse(nx, 0, neckW / 2, neckH / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = p.wrap;
      ctx.fill();

      const ex = side * (bw + neckW + endW / 2 + 1);
      ctx.beginPath();
      ctx.ellipse(ex, 0, endW / 2, endH / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = p.wrap;
      ctx.fill();

      ctx.strokeStyle = p.color;
      ctx.lineWidth = 0.6;
      for (let lx = ex - endW / 2 + 2; lx < ex + endW / 2; lx += 4) {
        ctx.beginPath();
        ctx.moveTo(lx, -endH / 2 + 1);
        ctx.lineTo(lx, endH / 2 - 1);
        ctx.stroke();
      }
    });

    ctx.restore();
  }

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.y += p.speed; p.x += p.drift; p.rot += p.rotSpeed;
      p.opacity = frame > 130 ? 1 - (frame - 130) / 50 : 1;
      drawCandy(ctx, p);

    });
    frame++;
    if (frame < 180) requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  animate();
}

buildBank();
buildText();
</script>
</body>
</html>
